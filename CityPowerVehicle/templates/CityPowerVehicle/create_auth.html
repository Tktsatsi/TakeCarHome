{% extends 'base.html' %}

{% block content %}

<h2>Create Vehicle Authorization</h2>

<form method="POST">

    {% csrf_token %}

    <div class="row">

        {% for field in form %}

        <div class="col-md-6 mb-3">

            <label class="form-label">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.errors %}
                <div class="text-danger">
                    {{ field.errors }}
                </div>
            {% endif %}

        </div>

        {% endfor %}

    </div>

    <button class="btn btn-primary">
        Submit Authorization
    </button>

</form>

{% endblock %}
